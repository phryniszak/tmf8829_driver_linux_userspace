<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMF8829 Live Distance Map</title>
<link rel="icon" href="data:,">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { overflow: hidden; }
  body { background: #1a1a1a; color: #ddd; font-family: monospace; font-size: 13px; display: flex; flex-direction: column; height: 100vh; }

  header { display: flex; align-items: center; gap: 12px; padding: 8px 12px; background: #252525; border-bottom: 1px solid #333; flex-wrap: wrap; }
  header h1 { font-size: 14px; font-weight: bold; color: #fff; white-space: nowrap; }

  #status-dot { width: 10px; height: 10px; border-radius: 50%; background: #888; flex-shrink: 0; }
  #status-dot.connecting { background: #f0c040; }
  #status-dot.connected  { background: #44cc44; }
  #status-dot.error      { background: #cc4444; }

  #ws-url { background: #333; border: 1px solid #555; color: #ddd; padding: 3px 6px; border-radius: 3px; width: 220px; font-family: monospace; font-size: 12px; }
  #btn-connect { background: #3a6; border: none; color: #fff; padding: 4px 10px; border-radius: 3px; cursor: pointer; font-size: 12px; }
  #btn-connect.disconnect { background: #a33; }

  #stats { display: flex; gap: 16px; padding: 5px 12px; background: #202020; border-bottom: 1px solid #333; font-size: 12px; flex-wrap: wrap; }
  .stat-label { color: #888; }
  .stat-value { color: #eee; }

  #peak-selector { display: flex; align-items: center; gap: 6px; margin-left: auto; }
  #peak-selector label { color: #888; font-size: 12px; }
  #peak-select { background: #333; border: 1px solid #555; color: #ddd; padding: 2px 5px; border-radius: 3px; font-size: 12px; }

  #canvas-container { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
  #grid-canvas { display: block; image-rendering: pixelated; cursor: crosshair; }

  #tooltip { position: fixed; background: rgba(0,0,0,0.85); border: 1px solid #555; padding: 5px 8px; border-radius: 4px; font-size: 11px; line-height: 1.6; pointer-events: none; white-space: nowrap; display: none; z-index: 100; }

  footer { padding: 6px 12px; background: #252525; border-top: 1px solid #333; display: flex; align-items: center; gap: 10px; }
  #scale-canvas { flex: 1; height: 16px; border-radius: 2px; }
  #scale-labels { display: flex; justify-content: space-between; font-size: 10px; color: #888; min-width: 120px; padding: 0 2px; gap: 8px; }

  #no-data { position: absolute; color: #555; font-size: 16px; pointer-events: none; }

  #params { background: #1e1e1e; border-bottom: 1px solid #333; font-size: 12px; }
  #params summary { padding: 5px 12px; cursor: pointer; color: #aaa; user-select: none; }
  #params summary:hover { color: #fff; }
  #params-body { display: flex; flex-wrap: wrap; align-items: center; gap: 10px 20px; padding: 8px 14px 10px; }
  #params-body label { color: #888; }
  #params-body select, #params-body input[type=number] {
    background: #333; border: 1px solid #555; color: #ddd;
    padding: 2px 5px; border-radius: 3px; font-size: 12px; font-family: monospace;
  }
  #params-body input[type=number] { width: 60px; }
  #params-body input[type=checkbox] { accent-color: #3a6; cursor: pointer; }
  #btn-apply { background: #3a6; border: none; color: #fff; padding: 4px 12px; border-radius: 3px; cursor: pointer; font-size: 12px; margin-left: auto; }
  #btn-apply:hover { background: #4bb; }
</style>
</head>
<body>

<header>
  <h1>TMF8829 Live Distance Map</h1>
  <div id="status-dot"></div>
  <input id="ws-url" type="text" spellcheck="false">
  <button id="btn-connect">Connect</button>
  <div id="peak-selector">
    <label>Peak:</label>
    <select id="peak-select">
      <option value="0">0</option>
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
    </select>
  </div>
</header>

<details id="params">
  <summary>Parameters</summary>
  <div id="params-body">
    <label>Mode:
      <select id="p-mode">
        <option value="0">0 — 8×8</option>
        <option value="1">1 — 8×8 long range</option>
        <option value="2">2 — 8×8 high accuracy</option>
        <option value="3">3 — 8×8 dual</option>
        <option value="4">4 — 8×8 long range dual</option>
        <option value="5">5 — 16×16</option>
        <option value="6">6 — 16×16 high accuracy</option>
        <option value="7">7 — 16×16 dual</option>
        <option value="8">8 — 32×32</option>
        <option value="9">9 — 32×32 high accuracy</option>
        <option value="10">10 — 32×32 dual</option>
        <option value="11">11 — 48×32</option>
        <option value="12">12 — 48×32 high accuracy</option>
        <option value="13">13 — 48×32 dual</option>
      </select>
    </label>
    <label>Period (ms): <input id="p-period" type="number" value="33" min="10" max="500"></label>
    <label>Peaks: <input id="p-peaks" type="number" value="1" min="1" max="4"></label>
    <label>Threshold: <input id="p-threshold" type="number" value="6" min="0" max="255"></label>
    <label><input id="p-signal" type="checkbox"> Signal</label>
    <label><input id="p-noise"  type="checkbox"> Noise</label>
    <label><input id="p-xtalk" type="checkbox"> Xtalk</label>
    <span style="border-left:1px solid #444;margin:0 4px;height:20px;display:inline-block"></span>
    <label>Min dist (mm): <input id="p-dmin" type="number" value="0"    min="0" max="9999"></label>
    <label>Max dist (mm): <input id="p-dmax" type="number" value="4000" min="1" max="9999"> <label style="font-size:11px"><input id="p-dauto" type="checkbox" checked> Auto</label></label>
    <button id="btn-apply">Apply</button>
  </div>
</details>

<div id="stats">
  <span><span class="stat-label">Frame </span><span class="stat-value" id="s-frame">—</span></span>
  <span><span class="stat-label">Temp </span><span class="stat-value" id="s-temp">—</span></span>
  <span><span class="stat-label">Warn </span><span class="stat-value" id="s-warn">—</span></span>
  <span><span class="stat-label">FPS </span><span class="stat-value" id="s-fps">—</span></span>
  <span><span class="stat-label">Grid </span><span class="stat-value" id="s-grid">—</span></span>
  <span><span class="stat-label">Range </span><span class="stat-value" id="s-range">—</span></span>
</div>

<div id="canvas-container">
  <span id="no-data">Waiting for data…</span>
  <canvas id="grid-canvas"></canvas>
</div>

<div id="tooltip"></div>

<footer>
  <canvas id="scale-canvas"></canvas>
  <div id="scale-labels">
    <span id="scale-min-label">0 mm</span><span id="scale-max-label">4000 mm</span>
  </div>
</footer>

<script>
'use strict';

// ── State ──────────────────────────────────────────────────────────────────
let ws = null;
let autoReconnectTimer = null;

let lastFrame = null;
let frameTimestamps = [];      // rolling window for FPS
let observedMax = 0;           // auto-scale: max distance seen
let displayMax = 4000;         // damped display max (mm)
const DAMP_FRAMES = 30;

// ── DOM refs ───────────────────────────────────────────────────────────────
const urlInput    = document.getElementById('ws-url');
urlInput.value    = 'ws://' + window.location.host;
const btnConnect  = document.getElementById('btn-connect');
const statusDot   = document.getElementById('status-dot');
const peakSelect  = document.getElementById('peak-select');
const pMode      = document.getElementById('p-mode');
const pPeriod    = document.getElementById('p-period');
const pPeaks     = document.getElementById('p-peaks');
const pThreshold = document.getElementById('p-threshold');
const pSignal    = document.getElementById('p-signal');
const pNoise     = document.getElementById('p-noise');
const pXtalk     = document.getElementById('p-xtalk');
const btnApply   = document.getElementById('btn-apply');
const pDmin      = document.getElementById('p-dmin');
const pDmax      = document.getElementById('p-dmax');
const pDauto     = document.getElementById('p-dauto');
const noData      = document.getElementById('no-data');
const tooltip     = document.getElementById('tooltip');
const gridCanvas  = document.getElementById('grid-canvas');
const scaleCanvas = document.getElementById('scale-canvas');
const ctx         = gridCanvas.getContext('2d');
const sctx        = scaleCanvas.getContext('2d');

// ── Parameter config line ──────────────────────────────────────────────────
function buildConfigLine() {
  return `mode=${pMode.value} period=${pPeriod.value} peaks=${pPeaks.value} ` +
         `threshold=${pThreshold.value} signal=${pSignal.checked?1:0} ` +
         `noise=${pNoise.checked?1:0} xtalk=${pXtalk.checked?1:0}`;
}

// ── Colour mapping ─────────────────────────────────────────────────────────
// distance 0          → dark grey (no target)
// distance in [min,max] → HSL hue 0° (red/near) … 240° (blue/far)
// outside range       → clamped to nearest colour edge
function distToColour(dist, minDist, maxDist) {
  if (dist === 0) return '#404040';
  const span = maxDist - minDist || 1;
  const t = Math.max(0, Math.min((dist - minDist) / span, 1));
  const hue = Math.round(t * 240);
  return `hsl(${hue},90%,50%)`;
}

// ── Scale bar ──────────────────────────────────────────────────────────────
function drawScaleBar(minDist, maxDist) {
  const w = scaleCanvas.width, h = scaleCanvas.height;
  const grad = sctx.createLinearGradient(0, 0, w, 0);
  for (let i = 0; i <= 20; i++) {
    const t = i / 20;
    grad.addColorStop(t, `hsl(${Math.round(t * 240)},90%,50%)`);
  }
  sctx.fillStyle = grad;
  sctx.fillRect(0, 0, w, h);
  document.getElementById('scale-min-label').textContent = minDist + ' mm';
  document.getElementById('scale-max-label').textContent = maxDist + ' mm';
}

// ── Grid rendering ─────────────────────────────────────────────────────────
function renderFrame(frame) {
  const results = frame.results;
  const rows = results.length;
  if (rows === 0) return;
  const cols = results[0].length;
  const peakIdx = parseInt(peakSelect.value, 10);

  // Determine display min/max
  const manualMin = Math.max(0, parseInt(pDmin.value, 10) || 0);
  const autoScale = pDauto.checked;
  if (autoScale) {
    let frameMax = 0;
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++) {
        const peaks = results[r][c].peaks;
        if (peaks.length > peakIdx) frameMax = Math.max(frameMax, peaks[peakIdx].distance);
      }
    if (frameMax > observedMax) observedMax = frameMax;
    displayMax += (Math.max(observedMax, 500) - displayMax) / DAMP_FRAMES;
    displayMax = Math.max(displayMax, manualMin + 1, 500);
    pDmax.value = Math.round(displayMax);
  } else {
    displayMax = Math.max(parseInt(pDmax.value, 10) || 4000, manualMin + 1);
  }
  const displayMin = manualMin;

  // Fit canvas to container
  const container = gridCanvas.parentElement;
  const aspect = cols / rows;
  let cw = container.clientWidth  - 4;
  let ch = container.clientHeight - 4;
  if (cw / ch > aspect) cw = Math.floor(ch * aspect);
  else                   ch = Math.floor(cw / aspect);
  cw = Math.max(cw, cols);
  ch = Math.max(ch, rows);
  if (gridCanvas.width !== cw || gridCanvas.height !== ch) {
    gridCanvas.width  = cw;
    gridCanvas.height = ch;
  }

  const cellW = cw / cols;
  const cellH = ch / rows;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const peaks = results[r][c].peaks;
      const dist = (peaks.length > peakIdx) ? peaks[peakIdx].distance : 0;
      ctx.fillStyle = distToColour(dist, displayMin, displayMax);
      ctx.fillRect(Math.floor(c * cellW), Math.floor(r * cellH),
                   Math.ceil(cellW) + 1, Math.ceil(cellH) + 1);
    }
  }

  drawScaleBar(displayMin, Math.round(displayMax));

  // Stats
  const info = frame.info;
  document.getElementById('s-frame').textContent = info.frame_number;
  document.getElementById('s-temp').textContent  = info.temperature + ' °C';
  document.getElementById('s-warn').textContent  = '0x' + info.warnings.toString(16).padStart(2,'0').toUpperCase();
  document.getElementById('s-grid').textContent  = cols + '×' + rows;
  document.getElementById('s-range').textContent = displayMin + ' – ' + Math.round(displayMax) + ' mm';

  // FPS
  const now = performance.now();
  frameTimestamps.push(now);
  if (frameTimestamps.length > 10) frameTimestamps.shift();
  if (frameTimestamps.length >= 2) {
    const elapsed = (frameTimestamps[frameTimestamps.length-1] - frameTimestamps[0]) / 1000;
    const fps = (frameTimestamps.length - 1) / elapsed;
    document.getElementById('s-fps').textContent = fps.toFixed(1);
  }

  noData.style.display = 'none';
  lastFrame = frame;
}

// ── Tooltip ────────────────────────────────────────────────────────────────
gridCanvas.addEventListener('mousemove', function(e) {
  if (!lastFrame) return;
  const results = lastFrame.results;
  const rows = results.length, cols = results[0].length;
  const rect = gridCanvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const col = Math.floor(mx / gridCanvas.width  * cols);
  const row = Math.floor(my / gridCanvas.height * rows);
  if (row < 0 || row >= rows || col < 0 || col >= cols) { tooltip.style.display='none'; return; }
  const peakIdx = parseInt(peakSelect.value, 10);
  const pixel = results[row][col];
  const peaks = pixel.peaks;
  const p = peaks.length > peakIdx ? peaks[peakIdx] : null;
  let html = `<b>[${row}, ${col}]</b><br>`;
  if (p) {
    html += `dist: <b>${p.distance} mm</b>  snr: ${p.snr}  sig: ${p.signal}<br>`;
    html += `x: ${p.x}  y: ${p.y}  z: ${p.z}`;
  } else {
    html += '(no peak data)';
  }
  if (pixel.noise)  html += `<br>noise: ${pixel.noise}`;
  if (pixel.xtalk)  html += `  xtalk: ${pixel.xtalk}`;
  tooltip.innerHTML = html;
  tooltip.style.display = 'block';
  const tx = e.clientX + 14, ty = e.clientY + 14;
  tooltip.style.left = tx + 'px';
  tooltip.style.top  = ty + 'px';
});
gridCanvas.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });

// ── WebSocket ──────────────────────────────────────────────────────────────
function setStatus(state) {
  statusDot.className = state;
}

function connect() {
  if (ws) { ws.close(); ws = null; }
  clearTimeout(autoReconnectTimer);
  const url = urlInput.value.trim();
  setStatus('connecting');
  btnConnect.textContent = 'Connecting…';
  btnConnect.className = '';

  try { ws = new WebSocket(url); }
  catch(e) { setStatus('error'); btnConnect.textContent = 'Connect'; return; }

  ws.onopen = () => {
    setStatus('connected');
    btnConnect.textContent = 'Disconnect';
    btnConnect.className = 'disconnect';
    ws.send(buildConfigLine());
    // keep peak selector in sync with requested number of peaks
    peakSelect.value = Math.min(parseInt(pPeaks.value, 10) - 1, 3).toString();
  };

  ws.onmessage = (e) => {
    let frame;
    try { frame = JSON.parse(e.data); } catch { return; }
    if (!frame.results || !frame.info) return;
    renderFrame(frame);
  };

  ws.onclose = () => {
    setStatus('error');
    btnConnect.textContent = 'Connect';
    btnConnect.className = '';
    ws = null;
    autoReconnectTimer = setTimeout(connect, 3000);
  };

  ws.onerror = () => {
    setStatus('error');
  };
}

function disconnect() {
  clearTimeout(autoReconnectTimer);
  if (ws) { ws.onclose = null; ws.close(); ws = null; }
  setStatus('');
  btnConnect.textContent = 'Connect';
  btnConnect.className = '';
}

btnConnect.addEventListener('click', () => {
  if (ws && ws.readyState === WebSocket.OPEN) disconnect();
  else connect();
});

peakSelect.addEventListener('change', () => { if (lastFrame) renderFrame(lastFrame); });

btnApply.addEventListener('click', () => {
  // Reconnect so the new process gets the updated config via onopen
  disconnect();
  setTimeout(connect, 100);
});

function resizeScaleBar() {
  scaleCanvas.width  = scaleCanvas.parentElement.clientWidth
                       - document.getElementById('scale-labels').offsetWidth - 10;
  scaleCanvas.height = 16;
  const mn = Math.max(0, parseInt(pDmin.value, 10) || 0);
  drawScaleBar(mn, Math.round(displayMax));
}

window.addEventListener('resize', () => {
  resizeScaleBar();
  if (lastFrame) renderFrame(lastFrame);
});

resizeScaleBar();
</script>
</body>
</html>
